<!--
	PUBLISHING CHECKLIST (authoritative copy also in CLAUDE.md).
	To publish a post "<slug>" (lowercase-kebab, no dates in slug, permanent forever):
	1. Copy this file to writing/<slug>.html. Fill every [BRACKET]. Zero <style> tags,
	   zero inline style attributes: new elements become a generic class in site.css.
	2. Add one entry (date, title, one-line gist) at the top of the current year group
	   in writing/index.html (add the year group if new).
	3. Prepend an <item> to feed.xml, bump <lastBuildDate>, drop the oldest item past 20.
	4. Rotate the home "From the notebook" teaser in index.html: TITLES ONLY, newest first, max 3.
	5. Deploy: cd /Users/agosh/Game/portfolio && npx --yes vercel --prod --yes
	   Then curl-verify the live post URL, /writing, and /feed.xml. Run ./check.sh <slug>.
	CONTENT RULES: no em dashes; never a year attached to a job or degree; no anniversary
	framings; human voice, no oversell; post dates themselves are fine. If the draft touches
	chargeable ground (politics etc.), tell Agosh before deploying; he decides per post.
	A mistyped slug that already shipped is fixed with a redirects entry in vercel.json,
	never by renaming the file.
-->
